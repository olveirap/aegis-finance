# SPDX-License-Identifier: MIT
# Keyword-to-category mapping for Argentine personal finance.
#
# Each category lists keywords for substring matching against
# merchant_raw + description.  The rule-based categorizer
# (aegis.parsers.categorizer.RuleBasedCategorizer) loads this file
# at init and uses it as its sole knowledge source.
#
# Flags:
#   partial:       true  → substring match (default); false → exact token only
#   positive_only: true  → category applies only when amount > 0

