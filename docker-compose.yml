services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aegis_finance
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: ${AEGIS_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis_finance"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
